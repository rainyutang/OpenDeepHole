rules:
  - id: c.loop-mutated-index-array-access.broad
    languages:
      - c
      - cpp
    severity: WARNING
    message: >
      Broad candidate: loop-updated index `$IDX` is used in an array access
      while the loop condition `$COND` does not directly constrain `$IDX` and
      no obvious local guard was found.
    metadata:
      category: security
      confidence: medium-low
      precision: medium-low
      recall: high
      llm_audit: true
      source_kind: array
      cwe:
        - "CWE-129: Improper Validation of Array Index"
        - "CWE-125: Out-of-bounds Read"
        - "CWE-787: Out-of-bounds Write"
      audit_focus: >
        This rule intentionally favors recall. Confirm only if `$IDX` can
        exceed the real capacity of `$BASE` on a reachable path.
    patterns:
      - pattern-either:
          - pattern-inside: |
              for (...; $COND; $IDX++) {
                ...
              }
          - pattern-inside: |
              for (...; $COND; ++$IDX) {
                ...
              }
          - pattern-inside: |
              for (...; $COND; $IDX--) {
                ...
              }
          - pattern-inside: |
              for (...; $COND; --$IDX) {
                ...
              }
          - pattern-inside: |
              for (...; $COND; $IDX += $STEP) {
                ...
              }
          - pattern-inside: |
              for (...; $COND; $IDX -= $STEP) {
                ...
              }
          - pattern-inside: |
              for (...; $COND; $IDX = $IDX + $STEP) {
                ...
              }
          - pattern-inside: |
              for (...; $COND; $IDX = $STEP + $IDX) {
                ...
              }
          - pattern-inside: |
              for (...; $COND; $IDX = $IDX - $STEP) {
                ...
              }
          - pattern-inside: |
              for (...; $COND; ..., $IDX++, ...) {
                ...
              }
          - pattern-inside: |
              for (...; $COND; ..., ++$IDX, ...) {
                ...
              }
          - pattern-inside: |
              for (...; $COND; ..., $IDX--, ...) {
                ...
              }
          - pattern-inside: |
              for (...; $COND; ..., --$IDX, ...) {
                ...
              }
          - pattern-inside: |
              for (...; $COND; ..., $IDX += $STEP, ...) {
                ...
              }
          - pattern-inside: |
              for (...; $COND; ..., $IDX -= $STEP, ...) {
                ...
              }
          - pattern-inside: |
              for (...; $COND; ...) {
                ...
                $IDX++;
                ...
              }
          - pattern-inside: |
              for (...; $COND; ...) {
                ...
                ++$IDX;
                ...
              }
          - pattern-inside: |
              for (...; $COND; ...) {
                ...
                $IDX--;
                ...
              }
          - pattern-inside: |
              for (...; $COND; ...) {
                ...
                --$IDX;
                ...
              }
          - pattern-inside: |
              for (...; $COND; ...) {
                ...
                $IDX += $STEP;
                ...
              }
          - pattern-inside: |
              for (...; $COND; ...) {
                ...
                $IDX -= $STEP;
                ...
              }
          - pattern-inside: |
              for (...; $COND; ...) {
                ...
                $IDX = $IDX + $STEP;
                ...
              }
          - pattern-inside: |
              for (...; $COND; ...) {
                ...
                $IDX = $STEP + $IDX;
                ...
              }
          - pattern-inside: |
              for (...; $COND; ...) {
                ...
                $IDX = $IDX - $STEP;
                ...
              }
          - pattern-inside: |
              while ($COND) {
                ...
                $IDX++;
                ...
              }
          - pattern-inside: |
              while ($COND) {
                ...
                ++$IDX;
                ...
              }
          - pattern-inside: |
              while ($COND) {
                ...
                $IDX--;
                ...
              }
          - pattern-inside: |
              while ($COND) {
                ...
                --$IDX;
                ...
              }
          - pattern-inside: |
              while ($COND) {
                ...
                $IDX += $STEP;
                ...
              }
          - pattern-inside: |
              while ($COND) {
                ...
                $IDX -= $STEP;
                ...
              }
          - pattern-inside: |
              while ($COND) {
                ...
                $IDX = $IDX + $STEP;
                ...
              }
          - pattern-inside: |
              while ($COND) {
                ...
                $IDX = $STEP + $IDX;
                ...
              }
          - pattern-inside: |
              while ($COND) {
                ...
                $IDX = $IDX - $STEP;
                ...
              }
          - pattern-inside: |
              do {
                ...
                $IDX++;
                ...
              } while ($COND);
          - pattern-inside: |
              do {
                ...
                ++$IDX;
                ...
              } while ($COND);
          - pattern-inside: |
              do {
                ...
                $IDX--;
                ...
              } while ($COND);
          - pattern-inside: |
              do {
                ...
                --$IDX;
                ...
              } while ($COND);
          - pattern-inside: |
              do {
                ...
                $IDX += $STEP;
                ...
              } while ($COND);
          - pattern-inside: |
              do {
                ...
                $IDX -= $STEP;
                ...
              } while ($COND);
      - pattern-either:
          - pattern: $BASE[$IDX]
          - pattern: $BASE[$IDX + $OFF]
          - pattern: $BASE[$IDX - $OFF]
          - pattern: $BASE[$OFF + $IDX]
      - metavariable-regex:
          metavariable: $IDX
          regex: ^[A-Za-z_][A-Za-z0-9_]*$
      - pattern-not-inside: |
          for (...; $IDX < $BOUND; ...) {
            ...
          }
      - pattern-not-inside: |
          for (...; $IDX <= $BOUND; ...) {
            ...
          }
      - pattern-not-inside: |
          while ($IDX < $BOUND) {
            ...
          }
      - pattern-not-inside: |
          while ($IDX <= $BOUND) {
            ...
          }
      - pattern-not-inside: |
          if ($IDX < $BOUND) {
            ...
          }
      - pattern-not-inside: |
          if ($IDX <= $BOUND) {
            ...
          }
      - pattern-not-inside: |
          if ($BOUND > $IDX) {
            ...
          }
      - pattern-not-inside: |
          if ($BOUND >= $IDX) {
            ...
          }
      - pattern-not-inside: |
          if ($IDX >= 0 && $IDX < $BOUND) {
            ...
          }
      - pattern-not-inside: |
          if (0 <= $IDX && $IDX < $BOUND) {
            ...
          }
      - pattern-not-inside: |
          if ($IDX >= $BOUND) return ...;
          ...
      - pattern-not-inside: |
          if ($IDX >= $BOUND) break;
          ...
      - pattern-not-inside: |
          if ($IDX >= $BOUND) goto $LABEL;
          ...
      - pattern-not-inside: |
          assert($IDX < $BOUND);
          ...
      - pattern-not-inside: |
          CHECK_RET($IDX < $BOUND, ...);
          ...
      - pattern-not-inside: |
          RETURN_IF_FAIL($IDX < $BOUND, ...);
          ...

  - id: c.loop-mutated-copy-from-user-sink.broad
    languages:
      - c
      - cpp
    severity: WARNING
    message: >
      Broad candidate: copy_from_user-family sink `$COPY` uses destination
      variable `$DST` inside a loop while `$DST` is updated by length variable
      `$LEN` in the same loop.
    metadata:
      category: security
      confidence: medium-low
      precision: medium-low
      recall: high
      llm_audit: true
      source_kind: copy-from-user
      cwe:
        - "CWE-125: Out-of-bounds Read"
        - "CWE-787: Out-of-bounds Write"
      audit_focus: >
        Confirm whether `$LEN` can be externally controlled or accumulated so
        that `$DST` advances past the real destination object before a
        copy_from_user-family write.
    patterns:
      - pattern-either:
          - pattern-inside: |
              for (...; $COND; ...) {
                ...
              }
          - pattern-inside: |
              while ($COND) {
                ...
              }
          - pattern-inside: |
              do {
                ...
              } while ($COND);
      - pattern: $COPY($DST, ..., $LEN)
      - pattern-either:
          - pattern-inside: |
              for (...; ...; $DST += $LEN) {
                ...
              }
          - pattern-inside: |
              for (...; ...; $DST -= $LEN) {
                ...
              }
          - pattern-inside: |
              for (...; ...; $DST = $DST + $LEN) {
                ...
              }
          - pattern-inside: |
              for (...; ...; $DST = $LEN + $DST) {
                ...
              }
          - pattern-inside: |
              for (...; ...; $DST = $DST - $LEN) {
                ...
              }
          - pattern-inside: |
              for (...; ...; ..., $DST += $LEN, ...) {
                ...
              }
          - pattern-inside: |
              for (...; ...; ..., $DST -= $LEN, ...) {
                ...
              }
          - pattern-inside: |
              for (...; ...; ...) {
                ...
                $DST += $LEN;
                ...
              }
          - pattern-inside: |
              for (...; ...; ...) {
                ...
                $DST -= $LEN;
                ...
              }
          - pattern-inside: |
              for (...; ...; ...) {
                ...
                $DST = $DST + $LEN;
                ...
              }
          - pattern-inside: |
              for (...; ...; ...) {
                ...
                $DST = $LEN + $DST;
                ...
              }
          - pattern-inside: |
              for (...; ...; ...) {
                ...
                $DST = $DST - $LEN;
                ...
              }
          - pattern-inside: |
              while (...) {
                ...
                $DST += $LEN;
                ...
              }
          - pattern-inside: |
              while (...) {
                ...
                $DST -= $LEN;
                ...
              }
          - pattern-inside: |
              while (...) {
                ...
                $DST = $DST + $LEN;
                ...
              }
          - pattern-inside: |
              while (...) {
                ...
                $DST = $LEN + $DST;
                ...
              }
          - pattern-inside: |
              while (...) {
                ...
                $DST = $DST - $LEN;
                ...
              }
          - pattern-inside: |
              do {
                ...
                $DST += $LEN;
                ...
              } while (...);
          - pattern-inside: |
              do {
                ...
                $DST -= $LEN;
                ...
              } while (...);
          - pattern-inside: |
              do {
                ...
                $DST = $DST + $LEN;
                ...
              } while (...);
          - pattern-inside: |
              do {
                ...
                $DST = $LEN + $DST;
                ...
              } while (...);
          - pattern-inside: |
              do {
                ...
                $DST = $DST - $LEN;
                ...
              } while (...);
      - metavariable-regex:
          metavariable: $COPY
          regex: ^(bspkern_copy_from_user|copy_from_user|_copy_from_user|raw_copy_from_user|copy_from_user_nofault)$
      - metavariable-regex:
          metavariable: $DST
          regex: ^[A-Za-z_][A-Za-z0-9_]*$
      - metavariable-regex:
          metavariable: $LEN
          regex: ^[A-Za-z_][A-Za-z0-9_]*$
      - pattern-not-inside: |
          if ($LEN > $BOUND) return ...;
          ...
      - pattern-not-inside: |
          if ($LEN >= $BOUND) return ...;
          ...
      - pattern-not-inside: |
          if ($LEN <= $BOUND) {
            ...
          }
      - pattern-not-inside: |
          if ($LEN < $BOUND) {
            ...
          }
      - pattern-not-inside: |
          CHECK_RET($LEN <= $BOUND, ...);
          ...
      - pattern-not-inside: |
          RETURN_IF_FAIL($LEN <= $BOUND, ...);
          ...

