# OpenDeepHole Agent bootstrap and managed configuration.
# server_url / agent_name / owner_token are local-only; the remaining v2
# sections are managed by the Web "Agent 配置" page after first connection.

server_url: "http://your-server:8000"
agent_name: ""
owner_token: ""
checkers: []

schema_version: 2
opencode_config: |
  {}
base:
  tool: "nga"
  executable: "nga"
  no_proxy: "10.0.0.0/8"

model_pool:
  global_concurrency: 4
  # A scan cannot start until at least one enabled row has an explicit model.
  models: []

threat_analysis:
  enabled: true
  attack_path_audit_mode: "after_analysis"
  model_policy:
    required_capability: "high"
    timeout_seconds: 1200
    max_retries: 3

code_graph:
  enabled: false
  name: "codegraph"
  transport: "local"
  timeout_seconds: 300
  local:
    executable: "codegraph"
    args: ["serve", "--mcp"]
    environment:
      CODEGRAPH_MCP_TOOLS: "explore,node,search,callers,callees,impact,files,status"
  remote:
    url: ""
    headers: {}

product_info:
  enabled: false
  name: "product-info"
  transport: "local"
  timeout_seconds: 300
  local:
    executable: "product-info"
    args: []
    environment: {}
  remote:
    url: ""
    headers: {}

vulnerability_mining:
  required_capability: "any"
  timeout_seconds: 1200
  max_retries: 2

false_positive:
  required_capability: "high"
  timeout_seconds: 1200
  max_retries: 2

vulnerability_validation:
  environments: {}
