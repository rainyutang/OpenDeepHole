# 整数翻转检测 — 入口点配置
#
# 指定哪些函数的参数来自外部输入（网络、文件、用户输入等）。
# 只有从这些入口函数可追溯到的算术操作才会被报告为候选漏洞。

# 方式零：自动检测（找出没有被任何函数调用的、有参数的、非 static 函数）
auto_detect: true

# 方式一：精确指定函数名和参数
entry_points:
  # - name: "HandleMessage"
  #   tainted_params: [0, 1]       # 参数下标（0-based），指定哪些参数是外部输入
  # - name: "ProcessPacket"
  #   tainted_params: "all"        # 所有参数都是外部输入

# 方式二：正则模式匹配（匹配到的函数所有参数视为外部输入）
entry_patterns:
  # - "^Handle.*"
  # - "^Process.*"
  # - "^OnRecv.*"
  # - "^Parse.*Msg$"
  # - "^Callback_.*"
