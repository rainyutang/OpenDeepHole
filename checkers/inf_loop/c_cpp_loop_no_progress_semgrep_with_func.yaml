- id: c-cpp.loop.for-empty-update-continue-no-progress-local
  languages:
  - c
  - cpp
  severity: WARNING
  message: 'Function=`$F`. CWE-835 potential infinite loop: local variable `$I` is controlled by a `for` loop whose increment
    expression is empty; this `continue` branch does not visibly update `$I`. In `for(init; cond; )`, `continue` jumps directly
    to the condition, not to any hidden increment. Move the increment into the loop header or advance `$I` before every continue.'
  metadata:
    cwe: CWE-835
    category: security
    technology:
    - c
    - cpp
    loop_var_origin: local-for-init
    confidence: HIGH
    scan_focus: empty for update plus continue path
    reports_function_name: true
    function_name_metavariable: $F
    function_context_note: Function name is captured from the enclosing C/C++ function or qualified method definition.
  patterns:
  - pattern-either:
    - pattern-inside: "$RET $F(...) {\n  ...\n}"
    - pattern-inside: "$RET *$F(...) {\n  ...\n}"
    - pattern-inside: "$RET &$F(...) {\n  ...\n}"
    - pattern-inside: "$RET $QUAL::$F(...) {\n  ...\n}"
    - pattern-inside: "$RET *$QUAL::$F(...) {\n  ...\n}"
    - pattern-inside: "$RET &$QUAL::$F(...) {\n  ...\n}"
  - pattern: "if ($COND) {\n  ...\n  continue;\n}\n"
  - pattern-either:
    - pattern-inside: "for ($T $I = $INIT; $I != $END; ) {\n  ...\n}\n"
    - pattern-inside: "for ($T $I = $INIT; $I < $END; ) {\n  ...\n}\n"
    - pattern-inside: "for ($T *$I = $INIT; $I != $END; ) {\n  ...\n}\n"
    - pattern-inside: "for ($T *$I = $INIT; $I < $END; ) {\n  ...\n}\n"
  - pattern-not: "if ($COND) {\n  ...\n  ++$I;\n  ...\n  continue;\n}\n"
  - pattern-not: "if ($COND) {\n  ...\n  $I++;\n  ...\n  continue;\n}\n"
  - pattern-not: "if ($COND) {\n  ...\n  $I += $STEP;\n  ...\n  continue;\n}\n"
  - pattern-not: "if ($COND) {\n  ...\n  $I = $NEXT;\n  ...\n  continue;\n}\n"
  - pattern-not: "if ($COND) {\n  ...\n  break;\n  ...\n}\n"
  - pattern-not: "if ($COND) {\n  ...\n  return ...;\n  ...\n}\n"
