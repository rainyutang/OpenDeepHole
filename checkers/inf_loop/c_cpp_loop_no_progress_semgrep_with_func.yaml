- id: cpp.iterator.erase-without-reassign-in-loop
  languages:
  - cpp
  severity: ERROR
  message: 'Function=`$F`. CWE-835/iterator invalidation risk: `$C.erase($IT)` is called inside a loop controlled by `$IT`,
    but the returned next iterator is not visibly assigned back to `$IT`. The erased iterator becomes invalid for standard
    containers, and continuing the loop can crash, skip elements, or loop on stale state. Prefer `$IT = $C.erase($IT)` or
    erase using `$C.erase($IT++)` only when that pattern is intentional and reviewed.'
  metadata:
    cwe: CWE-835
    category: security
    technology:
    - cpp
    loop_var_origin: iterator
    confidence: MEDIUM
    scan_focus: erase without iterator update
    reports_function_name: true
    function_name_metavariable: $F
    function_context_note: Function name is captured from the enclosing C/C++ function or qualified method definition.
  patterns:
  - pattern-either:
    - pattern-inside: "$RET $F(...) {\n  ...\n}"
    - pattern-inside: "$RET *$F(...) {\n  ...\n}"
    - pattern-inside: "$RET &$F(...) {\n  ...\n}"
    - pattern-inside: "$RET $QUAL::$F(...) {\n  ...\n}"
    - pattern-inside: "$RET *$QUAL::$F(...) {\n  ...\n}"
    - pattern-inside: "$RET &$QUAL::$F(...) {\n  ...\n}"
  - pattern: '$C.erase($IT);

      '
  - pattern-either:
    - pattern-inside: "while ($IT != $END) {\n  ...\n}\n"
    - pattern-inside: "for (...; $IT != $END; ...) {\n  ...\n}\n"
    - pattern-inside: "for (...; $IT != $C.end(); ...) {\n  ...\n}\n"
  - pattern-not: '$IT = $C.erase($IT);

      '
  - pattern-not: '$C.erase($IT++);

      '
  - pattern-not: '$C.erase(++$IT);

      '
  - pattern-not-inside: "{\n  ...\n  $C.erase($IT);\n  ...\n  break;\n  ...\n}\n"
  - pattern-not-inside: "{\n  ...\n  $C.erase($IT);\n  ...\n  return ...;\n  ...\n}\n"
