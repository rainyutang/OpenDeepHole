rules:
- id: c-cpp.loop.local-while-continue-no-progress
  languages:
  - c
  - cpp
  severity: WARNING
  message: 'Function=`$F`. CWE-835 potential infinite loop: local loop-progress variable `$I` is used in the while condition,
    but this `continue` branch does not visibly update `$I` before jumping back to the condition. If the branch is reachable
    for the same input/state, the loop can repeatedly process the same element/offset/pointer. Origin=local variable; risk
    is usually lower than parameter/global state but still important for parser loops. Add `++$I`, `$I += step`, `$I = next`,
    `break`, or `return` on this path, and validate zero-length/unknown-record cases.'
  metadata:
    cwe: CWE-835
    category: security
    technology:
    - c
    - cpp
    loop_var_origin: local
    confidence: MEDIUM
    scan_focus: continue path without progress
    reports_function_name: true
    function_name_metavariable: $F
    function_context_note: Function name is captured from the enclosing C/C++ function or qualified method definition.
  patterns:
  - pattern-either:
    - pattern-inside: "$RET $F(...) {\n  ...\n}"
    - pattern-inside: "$RET *$F(...) {\n  ...\n}"
    - pattern-inside: "$RET &$F(...) {\n  ...\n}"
    - pattern-inside: "$RET $QUAL::$F(...) {\n  ...\n}"
    - pattern-inside: "$RET *$QUAL::$F(...) {\n  ...\n}"
    - pattern-inside: "$RET &$QUAL::$F(...) {\n  ...\n}"
  - pattern: "if ($COND) {\n  ...\n  continue;\n}\n"
  - pattern-either:
    - pattern-inside: '$T $I = $INIT;

        ...

        '
    - pattern-inside: '$T *$I = $INIT;

        ...

        '
  - pattern-either:
    - pattern-inside: "while ($I != $END) {\n  ...\n}\n"
    - pattern-inside: "while ($I < $END) {\n  ...\n}\n"
    - pattern-inside: "while ($I <= $END) {\n  ...\n}\n"
    - pattern-inside: "while ($I > $END) {\n  ...\n}\n"
    - pattern-inside: "while ($I >= $END) {\n  ...\n}\n"
    - pattern-inside: "while ($I) {\n  ...\n}\n"
  - pattern-not: "if ($COND) {\n  ...\n  ++$I;\n  ...\n  continue;\n}\n"
  - pattern-not: "if ($COND) {\n  ...\n  $I++;\n  ...\n  continue;\n}\n"
  - pattern-not: "if ($COND) {\n  ...\n  --$I;\n  ...\n  continue;\n}\n"
  - pattern-not: "if ($COND) {\n  ...\n  $I--;\n  ...\n  continue;\n}\n"
  - pattern-not: "if ($COND) {\n  ...\n  $I += $STEP;\n  ...\n  continue;\n}\n"
  - pattern-not: "if ($COND) {\n  ...\n  $I -= $STEP;\n  ...\n  continue;\n}\n"
  - pattern-not: "if ($COND) {\n  ...\n  $I = $NEXT;\n  ...\n  continue;\n}\n"
  - pattern-not: "if ($COND) {\n  ...\n  break;\n  ...\n}\n"
  - pattern-not: "if ($COND) {\n  ...\n  return ...;\n  ...\n}\n"
