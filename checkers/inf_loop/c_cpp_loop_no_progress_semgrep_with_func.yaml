    - pattern-inside: "$RET &$F(...) {\n  ...\n}"
    - pattern-inside: "$RET $QUAL::$F(...) {\n  ...\n}"
    - pattern-inside: "$RET *$QUAL::$F(...) {\n  ...\n}"
    - pattern-inside: "$RET &$QUAL::$F(...) {\n  ...\n}"
  - pattern: '$I += $STEP;

      '
  - pattern-either:
    - pattern-inside: "while ($I < $END) {\n  ...\n}\n"
    - pattern-inside: "while ($I <= $END) {\n  ...\n}\n"
    - pattern-inside: "while ($I != $END) {\n  ...\n}\n"
    - pattern-inside: "for (; $I < $END; ) {\n  ...\n}\n"
    - pattern-inside: "for (; $I != $END; ) {\n  ...\n}\n"
  - pattern-not-inside: "while (...) {\n  ...\n  if ($STEP == 0) {\n    ...\n  }\n  ...\n}\n"
