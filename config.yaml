# OpenDeepHole Configuration

no_proxy: ""  # 逗号分隔的不走代理地址，如 "localhost,127.0.0.1,10.0.0.0/8"

server:
  host: "0.0.0.0"
  port: 8000

mcp_server:
  host: "0.0.0.0"
  port: 8100

opencode:
  executable: "opencode"  # opencode 可执行文件名或完整路径，如 "myopencode" 或 "C:/tools/opencode.cmd"
  model: ""
  timeout: 300  # seconds per candidate analysis
  mock: false    # set to false when opencode is configured

storage:
  projects_dir: "/tmp/opendeephole/projects"
  scans_dir: "/tmp/opendeephole/scans"
  max_upload_size_mb: 2048

logging:
  level: "DEBUG"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/opendeephole.log"
  max_size_mb: 10      # max size per log file in MB
  backup_count: 5      # number of rotated log files to keep

llm_api:
  enabled: false       # true 启用 API 直调模式（优先于 opencode）
  base_url: ""         # OpenAI 兼容 API 地址
  api_key: ""          # API key
  model: "gpt-4o-mini"
  temperature: 0.1
  timeout: 120         # 单次调用超时（秒）
  max_retries: 3
